<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOCON Config Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter:400,600&display=swap" rel="stylesheet">
    <!-- CodeMirror 5 from CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <!-- HOCON-specific: properties mode for include/substitution, plus comment support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/overlay.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ request.scope.get('root_path', '') }}/static/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-row">
            <div>
                <h1>HOCON Config Editor</h1>
                <p class="subtitle">Manage agent network configurations</p>
            </div>
            <div class="header-controls">
                <button id="btn-new" type="button" title="Create new HOCON file">New File</button>
                <button id="btn-save" type="button" class="btn-primary" title="Save current file">Save</button>
                <button id="btn-validate" type="button" title="Validate HOCON syntax">Validate</button>
                <button id="btn-download" type="button" title="Download current file">Download</button>
                <button id="btn-upload" type="button" title="Upload a .hocon file">Upload</button>
                <button id="btn-delete" type="button" class="btn-danger" title="Delete current file">Delete</button>
            </div>
        </div>
    </header>

    <!-- Two-panel main content -->
    <div class="interface-row">
        <!-- Left panel: File tree -->
        <section id="file-tree-section" aria-label="File Browser">
            <h2>Files</h2>
            <div id="file-tree" class="tree-box"></div>
            <div id="manifest-section">
                <h2>Manifest</h2>
                <div id="manifest-list" class="manifest-box"></div>
            </div>
        </section>

        <!-- Right panel: Editor -->
        <section id="editor-section" aria-label="Code Editor">
            <div id="editor-header">
                <span id="current-file">No file selected</span>
                <span id="editor-status"></span>
            </div>
            <div id="error-banner" class="error-banner" style="display:none;">
                <span id="error-banner-text"></span>
                <button id="error-banner-close" type="button" title="Dismiss">&times;</button>
            </div>
            <div id="editor-container">
                <textarea id="code-editor"></textarea>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer>
        <small>&copy; 2025-2026 Cognizant Technology Solutions &mdash; Powered by Neuro-SAN</small>
    </footer>

    <script>
        // ---------------------------------------------------------------
        // Base path (adapts when mounted under a sub-path like /editor)
        // ---------------------------------------------------------------
        var API_BASE = "{{ request.scope.get('root_path', '') }}";

        // ---------------------------------------------------------------
        // State
        // ---------------------------------------------------------------
        var currentFile = null;
        var editor = null;
        var unsavedChanges = false;

        // ---------------------------------------------------------------
        // CodeMirror setup
        // ---------------------------------------------------------------
        // ---------------------------------------------------------------
        // HOCON overlay mode — highlights include, ${substitutions}, # comments
        // ---------------------------------------------------------------
        CodeMirror.defineMode('hocon', function(config) {
            var jsonMode = CodeMirror.getMode(config, { name: 'javascript', json: true });
            return CodeMirror.overlayMode(jsonMode, {
                token: function(stream) {
                    // # or // line comments
                    if (stream.match(/^[#]/) || stream.match(/^\/\//)) {
                        stream.skipToEnd();
                        return 'comment';
                    }
                    // include directive
                    if (stream.match(/^include\b/)) {
                        return 'keyword';
                    }
                    // ${substitution} references
                    if (stream.match(/^\$\{[^}]*\}/)) {
                        return 'variable-2';
                    }
                    // Unquoted string values (after : or =)
                    stream.next();
                    return null;
                }
            });
        });

        // ---------------------------------------------------------------
        // Theme detection — sync with nsflow's localStorage 'mode'
        // ---------------------------------------------------------------
        function getEffectiveTheme() {
            var mode;
            try { mode = localStorage.getItem('mode'); } catch(e) {}
            if (mode === 'dark') return 'dark';
            if (mode === 'light') return 'light';
            // 'system' or unset — follow OS preference
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            if (editor) {
                editor.setOption('theme', theme === 'dark' ? 'material-darker' : 'eclipse');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
                mode: 'hocon',
                theme: getEffectiveTheme() === 'dark' ? 'material-darker' : 'eclipse',
                lineNumbers: true,
                matchBrackets: true,
                autoCloseBrackets: true,
                indentUnit: 4,
                tabSize: 4,
                indentWithTabs: false,
                lineWrapping: true
            });

            editor.on('change', function() {
                if (currentFile) {
                    unsavedChanges = true;
                    setStatus('modified', 'Unsaved changes');
                    updateFileLabel();
                    hideError();
                }
            });

            editor.setSize('100%', '100%');

            // Apply initial theme and listen for changes
            applyTheme(getEffectiveTheme());

            // Listen for theme messages from parent frame (postMessage)
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'nss-theme') {
                    applyTheme(e.data.theme);
                }
            });

            // Fallback: storage event + OS preference + polling (for standalone mode)
            window.addEventListener('storage', function(e) {
                if (e.key === 'mode') applyTheme(getEffectiveTheme());
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                applyTheme(getEffectiveTheme());
            });
            var lastTheme = getEffectiveTheme();
            setInterval(function() {
                var t = getEffectiveTheme();
                if (t !== lastTheme) { lastTheme = t; applyTheme(t); }
            }, 1000);

            loadFileTree();
            loadManifest();
        });

        // ---------------------------------------------------------------
        // Status indicator + file label
        // ---------------------------------------------------------------
        function setStatus(cls, text) {
            var el = document.getElementById('editor-status');
            el.className = 'status-' + cls;
            el.textContent = text;
        }

        function updateFileLabel() {
            var el = document.getElementById('current-file');
            if (!currentFile) {
                el.textContent = 'No file selected';
            } else {
                el.textContent = unsavedChanges ? currentFile + ' *' : currentFile;
            }
        }

        // ---------------------------------------------------------------
        // Global functions exposed to parent frame (blade close prompt)
        // ---------------------------------------------------------------
        window.hasUnsavedChanges = function() { return unsavedChanges; };
        window.saveCurrentFile = function() { saveFile(); };

        // ---------------------------------------------------------------
        // Error banner (non-blocking, dismissible)
        // ---------------------------------------------------------------
        function showError(message) {
            var banner = document.getElementById('error-banner');
            var text = document.getElementById('error-banner-text');
            text.textContent = message;
            banner.style.display = 'flex';
        }

        function hideError() {
            document.getElementById('error-banner').style.display = 'none';
        }

        document.getElementById('error-banner-close').addEventListener('click', hideError);

        // ---------------------------------------------------------------
        // File tree
        // ---------------------------------------------------------------
        function loadFileTree() {
            fetch(API_BASE + '/api/files')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    renderFileTree(data.files);
                })
                .catch(function(err) {
                    console.error('Failed to load file tree:', err);
                });
        }

        function renderFileTree(files) {
            var container = document.getElementById('file-tree');
            container.innerHTML = '';

            // Group by directory
            var dirs = {};
            files.forEach(function(f) {
                var dir = f.directory || '.';
                if (!dirs[dir]) dirs[dir] = [];
                dirs[dir].push(f);
            });

            // Sort directory keys
            var sortedDirs = Object.keys(dirs).sort();
            sortedDirs.forEach(function(dir) {
                // Directory label
                if (dir !== '.') {
                    var dirEl = document.createElement('div');
                    dirEl.className = 'tree-dir';
                    dirEl.textContent = dir + '/';
                    container.appendChild(dirEl);
                }

                // Files in this directory
                dirs[dir].forEach(function(f) {
                    var fileEl = document.createElement('div');
                    fileEl.className = 'tree-file';
                    if (dir !== '.') {
                        fileEl.style.paddingLeft = '24px';
                    }
                    fileEl.textContent = f.name;
                    fileEl.title = f.path;
                    fileEl.setAttribute('data-path', f.path);
                    fileEl.addEventListener('click', function() {
                        openFile(f.path);
                    });
                    container.appendChild(fileEl);
                });
            });
        }

        // ---------------------------------------------------------------
        // File operations
        // ---------------------------------------------------------------
        function openFile(path) {
            if (unsavedChanges && !confirm('You have unsaved changes. Discard?')) {
                return;
            }
            fetch(API_BASE + '/api/files/' + encodeURIComponent(path))
                .then(function(r) {
                    if (!r.ok) throw new Error('Failed to load file');
                    return r.json();
                })
                .then(function(data) {
                    currentFile = data.path;
                    editor.setValue(data.content);
                    unsavedChanges = false;
                    updateFileLabel();
                    setStatus('saved', 'Loaded');
                    hideError();

                    // Highlight active file in tree
                    document.querySelectorAll('.tree-file').forEach(function(el) {
                        el.classList.toggle('active', el.getAttribute('data-path') === path);
                    });
                })
                .catch(function(err) {
                    showError('Error loading file: ' + err.message);
                });
        }

        function saveFile() {
            if (!currentFile) {
                showError('No file is open.');
                return;
            }
            var content = editor.getValue();

            // Validate before saving — block save if invalid
            fetch(API_BASE + '/api/validate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            })
            .then(function(r) { return r.json(); })
            .then(function(vResult) {
                if (!vResult.valid) {
                    setStatus('error', 'Cannot save — invalid HOCON');
                    showError(vResult.error);
                    return;
                }
                // Validation passed — proceed with save
                return fetch(API_BASE + '/api/files/' + encodeURIComponent(currentFile), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                })
                .then(function(r) {
                    if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail); });
                    return r.json();
                })
                .then(function() {
                    unsavedChanges = false;
                    updateFileLabel();
                    setStatus('saved', 'Saved');
                    hideError();
                });
            })
            .catch(function(err) {
                showError('Error saving: ' + err.message);
            });
        }

        function validateFile() {
            var content = editor.getValue();
            if (!content.trim()) {
                showError('Editor is empty.');
                return;
            }
            fetch(API_BASE + '/api/validate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.valid) {
                    setStatus('valid', 'Valid HOCON');
                    hideError();
                } else {
                    setStatus('error', 'Invalid HOCON');
                    showError(data.error);
                }
            })
            .catch(function(err) {
                showError('Validation request failed: ' + err.message);
            });
        }

        function createFile() {
            var name = prompt('Enter file path (relative to registries/).\nExample: my_network.hocon');
            if (!name) return;
            if (!name.endsWith('.hocon')) name += '.hocon';

            var content = '{\n    # New agent network configuration\n}\n';
            fetch(API_BASE + '/api/files/' + encodeURIComponent(name), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail); });
                return r.json();
            })
            .then(function() {
                loadFileTree();
                openFile(name);
            })
            .catch(function(err) {
                showError('Error creating file: ' + err.message);
            });
        }

        function deleteFile() {
            if (!currentFile) {
                showError('No file is open.');
                return;
            }
            if (!confirm('Delete "' + currentFile + '"? This cannot be undone.')) {
                return;
            }
            fetch(API_BASE + '/api/files/' + encodeURIComponent(currentFile), {
                method: 'DELETE'
            })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail); });
                return r.json();
            })
            .then(function() {
                currentFile = null;
                editor.setValue('');
                unsavedChanges = false;
                document.getElementById('current-file').textContent = 'No file selected';
                setStatus('', '');
                loadFileTree();
            })
            .catch(function(err) {
                showError('Error deleting file: ' + err.message);
            });
        }

        // ---------------------------------------------------------------
        // Manifest management
        // ---------------------------------------------------------------
        function loadManifest() {
            fetch(API_BASE + '/api/manifest')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    renderManifest(data.entries);
                })
                .catch(function(err) {
                    console.error('Failed to load manifest:', err);
                });
        }

        function renderManifest(entries) {
            var container = document.getElementById('manifest-list');
            container.innerHTML = '';
            var keys = Object.keys(entries).sort();
            keys.forEach(function(key) {
                var entry = entries[key];
                var row = document.createElement('div');
                row.className = 'manifest-entry';

                var toggle = document.createElement('input');
                toggle.type = 'checkbox';
                toggle.checked = entry.enabled;
                toggle.title = 'Toggle ' + key;
                toggle.addEventListener('change', function() {
                    toggleManifest(key, toggle.checked);
                });

                var label = document.createElement('span');
                label.className = 'manifest-label';
                label.textContent = key;
                if (entry.public === false) {
                    label.textContent += ' (private)';
                    label.classList.add('manifest-private');
                }

                row.appendChild(toggle);
                row.appendChild(label);
                container.appendChild(row);
            });
        }

        function toggleManifest(network, enabled) {
            fetch(API_BASE + '/api/manifest/' + encodeURIComponent(network), {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled: enabled })
            })
            .then(function(r) {
                if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail); });
                return r.json();
            })
            .then(function() {
                setStatus('saved', network + (enabled ? ' enabled' : ' disabled'));
            })
            .catch(function(err) {
                showError('Error toggling manifest: ' + err.message);
                loadManifest();
            });
        }

        // ---------------------------------------------------------------
        // Download / Upload
        // ---------------------------------------------------------------
        function downloadFile() {
            if (!currentFile) {
                showError('No file is open.');
                return;
            }
            var content = editor.getValue();
            var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = currentFile.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function uploadFile() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.hocon';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                if (!file.name.endsWith('.hocon')) {
                    showError('Only .hocon files are supported.');
                    return;
                }
                // Ask user for target folder within registries
                var folder = prompt(
                    'Upload to which folder inside registries/?\n\n'
                    + 'Leave blank for the root, or enter a subfolder path.\n'
                    + 'Example: my_agents\n'
                    + 'Example: team/project',
                    ''
                );
                if (folder === null) return; // cancelled
                folder = folder.replace(/^\/+|\/+$/g, ''); // trim slashes
                var targetPath = folder ? (folder + '/' + file.name) : file.name;

                var reader = new FileReader();
                reader.onload = function(ev) {
                    var content = ev.target.result;
                    fetch(API_BASE + '/api/files/' + encodeURIComponent(targetPath), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: content })
                    })
                    .then(function(r) {
                        if (r.status === 409) {
                            if (confirm('"' + targetPath + '" already exists. Overwrite?')) {
                                return fetch(API_BASE + '/api/files/' + encodeURIComponent(targetPath), {
                                    method: 'PUT',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ content: content })
                                });
                            }
                            return null;
                        }
                        if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail); });
                        return r;
                    })
                    .then(function(r) {
                        if (!r) return;
                        if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail); });
                        loadFileTree();
                        openFile(targetPath);
                        setStatus('saved', 'Uploaded: ' + targetPath);
                    })
                    .catch(function(err) {
                        showError('Upload error: ' + err.message);
                    });
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ---------------------------------------------------------------
        // Button bindings
        // ---------------------------------------------------------------
        document.getElementById('btn-new').addEventListener('click', createFile);
        document.getElementById('btn-save').addEventListener('click', saveFile);
        document.getElementById('btn-validate').addEventListener('click', validateFile);
        document.getElementById('btn-download').addEventListener('click', downloadFile);
        document.getElementById('btn-upload').addEventListener('click', uploadFile);
        document.getElementById('btn-delete').addEventListener('click', deleteFile);

        // Keyboard shortcut: Ctrl/Cmd+S to save
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
        });
    </script>
</body>
</html>
