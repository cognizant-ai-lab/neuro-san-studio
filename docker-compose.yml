version: '3.9'

services:
  # NeuroSan core server
  neuro-san:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: neuro-san-server
    ports:
      - "8080:8080"
    environment:
      # Server configuration
      NEURO_SAN_SERVER_HOST: 0.0.0.0
      NEURO_SAN_SERVER_HTTP_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENT_HTTP_SERVER_INSTANCES: 1
      AGENT_MAX_CONCURRENT_REQUESTS: 50
      AGENT_MCP_ENABLE: "true"

      # Python configuration
      PYTHONPATH: /usr/local/neuro-san/myapp

      # Agent configuration
      AGENT_MANIFEST_FILE: /usr/local/neuro-san/myapp/registries/manifest.hocon /usr/local/neuro-san/myapp/registries/manifest_multiuser_overlay.hocon
      AGENT_TOOL_PATH: /usr/local/neuro-san/myapp/coded_tools
      AGENT_TOOLBOX_INFO_FILE: /usr/local/neuro-san/myapp/toolbox/toolbox_info.hocon
      AGENT_SERVICE_LOG_JSON: /usr/local/neuro-san/myapp/deploy/logging.hocon

      # LLM API Keys (can be overridden at container startup)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # Logging and observability
      AGENT_SERVER_NAME: "neuro-san-docker"
      AGENT_FORWARDED_REQUEST_METADATA: "request_id user_id"

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    networks:
      - neuro-san-network

    restart: unless-stopped

  # API Gateway for per-request API key injection
  api-gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: neuro-san-gateway
    ports:
      - "9000:9000"
    environment:
      # Gateway configuration
      API_GATEWAY_HOST: 0.0.0.0
      API_GATEWAY_PORT: 9000
      NEURO_SAN_HOST: neuro-san
      NEURO_SAN_PORT: 8080
      REQUEST_TIMEOUT: 300
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Python configuration
      PYTHONPATH: /usr/local/neuro-san/myapp

    command: >
      python -m uvicorn
      middleware.api_gateway:app
      --host 0.0.0.0
      --port 9000
      --reload

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

    depends_on:
      neuro-san:
        condition: service_healthy

    networks:
      - neuro-san-network

    restart: unless-stopped

  # Optional: Nginx reverse proxy with HTTPS
  nginx:
    image: nginx:alpine
    container_name: neuro-san-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
    networks:
      - neuro-san-network
    restart: unless-stopped
    profiles:
      - with-nginx

networks:
  neuro-san-network:
    driver: bridge

volumes:
  logs:
    driver: local
