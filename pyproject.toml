[tool.ruff]
target-version = "py312"
line-length = 119
src = ["apps", "coded_tools", "plugins", "tests"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors (e.g. indentation, whitespace, line length)
    "F",  # Pyflakes checks (e.g. undefined names, unused imports, unused variables)
    "I",  # isort import-ordering rules
    "W",  # pycodestyle warnings (e.g. trailing whitespace, blank lines)
]
ignore = []

[tool.ruff.lint.isort]
force-single-line = true
known-first-party = ["apps", "coded_tools", "tests"]

[tool.pylint]
max-line-length = 119
# Based on Google Python Style Guide
disable = [
    "C0301",  # Line too long (handled by ruff)
    "C0114",  # Missing module docstring (missing-module-docstring)
    # This repo contains examples that should remain independent, so we expect some level of copy/paste
    "R0801",  # Similar lines in 2 files
    "W0511",  # TODO/FIXME comments
    ]
good-names = ["i", "j", "k", "ex", "_", "id", "f", "db", "e"]
ignore-patterns = [".*checkpoint\\.py"]
ignore-paths = ["^venv/.*$", "^.*/\\.venv/.*$"]
# Google style requires docstrings
enable = [
    "useless-suppression",
]
# Google style naming conventions
const-naming-style = "UPPER_CASE"
function-naming-style = "snake_case"
class-naming-style = "PascalCase"
method-naming-style = "snake_case"
attr-naming-style = "snake_case"
argument-naming-style = "snake_case"
variable-naming-style = "snake_case"
inlinevar-naming-style = "snake_case"
# Additional settings
fail-under = 10.0
output-format = "colorized"
init-import = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--verbose --cov=. --cov-report=term-missing --no-cov-on-fail"
markers = [
    "existing_marker: ...",
    "integration: integration tests that may be slow or hit external services",
]

[tool.md_dead_link_check]
exclude_files = ["venv/*"]
exclude_links = [
    # Localhost and local development URLs
    "http://localhost*",
    "https://localhost*",
    "http://127.0.0.1*",
    # Placeholder and example URLs
    "https://github.com/your-username/*",
    "https://your-instance.atlassian.net*",
    "https://mydomain.my.salesforce.com*",
    "https://your_base_url.openai.azure.com*",
    # URLs that require authentication or block bots
    "https://platform.openai.com/*",
    "https://portal.azure.com/*",
    "https://api.slack.com/apps*",
    "https://api.salesforce.com*",
    "https://medium.com/@evolutionmlmail*",
    "https://dl.acm.org/*",
    "https://community.openai.com/*",
    "https://citeseerx.ist.psu.edu/*",
    # API endpoints (not browsable)
    "https://api.search.brave.com/*",
    "https://customsearch.googleapis.com/*",
    "https://www.googleapis.com/customsearch/*",
    # Sites that timeout or block CI requests
    "https://docs.servicenow.com/*",
    # Broken or private external links
    "https://github.com/deepsaia/vibe-coding-eval*",
    "https://google.github.io/A2A/specification*",
    # Shield badges (dynamic content, not actual pages)
    "https://img.shields.io/*",
    "https://static.pepy.tech/badge/*",
]

[tool.coverage.run]
omit = ["tests/*", "*/venv/*"]
