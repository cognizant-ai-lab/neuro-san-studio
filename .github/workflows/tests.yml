name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    container:
      image: python:3.13-slim

    steps:
      - name: Install git
        run: |
          apt-get update && apt-get install -y git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR is from a fork
        id: fork_check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
              echo "is_fork=true" >> $GITHUB_OUTPUT
            else
              echo "is_fork=false" >> $GITHUB_OUTPUT
            fi
          else
          # Not a PR — so it's not a fork
            echo "is_fork=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        shell: bash
        run: |
          apt-get update && apt-get install -y shellcheck make curl
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements-build.txt
          pip install -r requirements.txt

      - name: Show installed packages
        shell: bash
        run: |
          source venv/bin/activate 
          pip freeze

      - name: Run make lint-check
        # We run this check-only step to break the build if
        # formatting changes are needed
        shell: bash
        run: |
          source venv/bin/activate 
          make lint-check
      
      - name: Run dead link checker
        shell: bash
        run: |
          curl --silent --location \
          https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz \
          | tar --extract --gzip --directory /tmp
          # Determine which files to check:
          # - If files were moved/renamed/deleted, check ALL .md files (links to those files may break elsewhere)
          # - Otherwise, only check links in changed files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          else
            DIFF_BASE="${{ github.event.before }}"
          fi
          HAS_MOVES=$(git diff --name-only --diff-filter=DR "$DIFF_BASE"..HEAD 2>/dev/null | head -1)
          if [ -n "$HAS_MOVES" ]; then
            echo "Detected moved/renamed/deleted files — checking all .md files."
            CHECK_FILES=$(git ls-files '*.md')
          else
            CHECK_FILES=$(git diff --name-only --diff-filter=ACMR "$DIFF_BASE"..HEAD 2>/dev/null || git ls-files)
          fi
          if [ -n "$CHECK_FILES" ]; then
            # To prevent flaky CI failures, accept:
            # - 403 (Forbidden) if the server blocks bots or requests without a browser-like User-Agent
            # - 429 (rate limit)
            # - 503 (temporary outage)
            /tmp/lychee --max-retries 3 --retry-wait-time 3 --verbose --accept '200,203,204,403,429,503' --exclude-path venv $CHECK_FILES
          else
            echo "No files changed — skipping link check."
          fi

      - name: Run make test
        shell: bash
        run: |
          source venv/bin/activate 
          make test
        env:
          AGENT_TOOL_PATH: "./neuro_san/coded_tools"
          PYTHONPATH: ${{ env.PYTHONPATH }}:"."

      - name: Check README renders correctly on PyPI
        shell: bash
        run: |
          source venv/bin/activate
          pip install readme_renderer readme_renderer[md]
          python -m readme_renderer README.md

      - name: Notify Slack on success
        if: success() && steps.fork_check.outputs.is_fork == 'false'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ *Tests Passed* for `${{ github.repository }}` on `${{ github.ref_name }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure() && steps.fork_check.outputs.is_fork == 'false'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ *Tests Failed* for `${{ github.repository }}` on `${{ github.ref_name }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
