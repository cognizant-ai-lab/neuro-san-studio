---
# Test workflow — consumes the shared Python quality gate
# from build-common (ruff toolchain: ruff format + ruff check
# + pylint).
#
# NOTE: This branch temporarily points at the build-common
# PR branch for integration testing.  Before merging,
# update the ref to the merged SHA on main.
name: Test

"on":
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    if: >
      (github.event_name == 'push' &&
       github.ref != 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main')
    # yamllint disable-line rule:line-length
    uses: cognizant-ai-lab/build-common/.github/workflows/_python-quality-gate.yml@devin/1771545839-python-quality-gate-abstraction
    with:
      # Point at the build-common PR branch for testing.
      # Replace with "main" (or remove) before merging.
      build-common-ref: "devin/1771545839-python-quality-gate-abstraction"
      lint-toolchain: "ruff"
      python-version: "3.13"
      sources: "run.py apps coded_tools plugins tests"
      run-pylint: true
      run-markdownlint: true
      run-shellcheck: true
      check-readme-pypi: true
      system-packages: "curl"
      # pytest is invoked directly (not via make test) to
      # avoid the Makefile venv-guard check.
      test-command-override: >-
        python -m pytest tests/ -v
        --cov=coded_tools,run.py
        -m "not integration"
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
