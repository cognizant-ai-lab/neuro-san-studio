name: AND Smoke Tests

permissions:
    contents: read

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 PM UTC = 4:00 AM PT (standard)
  workflow_dispatch:      # enables manual triggering

jobs:
  and-smoke-test:
    runs-on: ubuntu-latest

    # Job-level ENV shared by all steps
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: "."
      AGENT_TOOL_PATH: "coded_tools/"
      AGENT_MANIFEST_FILE: "registries/manifest.hocon"
      AGENT_TEMPORARY_NETWORK_UPDATE_PERIOD_SECONDS: 5

    # don't run this job in sync'd clones
    if: github.repository == 'cognizant-ai-lab/neuro-san-studio'
    container:
      image: python:3.13-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          apt-get update && apt-get install -y make curl
          make install

      - name: Show installed packages
        shell: bash
        run: |
          source venv/bin/activate
          pip freeze

      - name: Start server & run AND smoke tests & print server log if any failure
        shell: bash
        run: |
          source venv/bin/activate
          build_scripts/server_start.sh

          if ! pytest -s --verbose -m "integration_and_smoke" --timer-top-n 100; then
            echo "===================================================="
            echo "=== Server Log ==="
            cat logs/server.log || echo "(no server.log found)"
            echo "===================================================="
            exit 1
          fi

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "AND Smoke Tests Passed for `${{ github.repository }}` on `${{ github.ref_name }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "AND Smoke Tests Failed for `${{ github.repository }}` on `${{ github.ref_name }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
